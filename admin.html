<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="alternate icon" href="favicon.ico" />
<meta name="theme-color" content="#0b1a1f" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin | Tidehold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="/">Tidehold</a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/ledger">Ledger</a>
      <a href="/admin" aria-current="page">Admin</a>
    </nav>
  </div>
</header>

<main class="section wrap">
  <div class="head">
    <p class="eyebrow">Moderation</p>
    <h2>Admin console</h2>
    <p>Restricted to the harbor master. Connect the admin wallet and sign in to view stats, review flagged accounts, and act.</p>
  </div>

  <p class="ledger-status" id="status"><span class="dot" id="statusDot"></span><span id="statusText">Not signed in.</span></p>

  <div class="row" style="display:flex; gap:.6rem; flex-wrap:wrap; margin:.4rem 0 1.4rem;">
    <button class="btn btn--brass" id="authBtn">Connect &amp; sign in</button>
    <button class="btn btn--ghost" id="refreshBtn" style="display:none;">Refresh</button>
  </div>

  <div id="gated" style="display:none;">
    <div class="gauges" id="gauges"></div>

    <div class="panel" style="margin-top:1.4rem;">
      <span class="eyebrow">Flagged accounts</span>
      <div id="flagged"></div>
    </div>

    <div class="panel" style="margin-top:1.4rem;">
      <span class="eyebrow">Banned accounts</span>
      <div id="banned"></div>
    </div>

    <div class="panel" style="margin-top:1.4rem;">
      <span class="eyebrow">Manual ban</span>
      <div class="row" style="display:flex; gap:.6rem; flex-wrap:wrap; align-items:center;">
        <input id="banWallet" placeholder="wallet address" style="flex:1; min-width:240px; padding:.6rem .8rem; font-family:'JetBrains Mono',monospace;" />
        <input id="banReason" placeholder="reason" style="flex:1; min-width:160px; padding:.6rem .8rem;" />
        <button class="btn btn--sm" id="banBtn">Ban</button>
      </div>
    </div>
  </div>
</main>

<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
