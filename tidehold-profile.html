<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tidehold — Captain's Dossier</title>

<!--
  TIDEHOLD PLAYER PROFILE
  =======================
  Standalone page. Drop it on the site (e.g. tidehold.world/u). It reads the player from the URL:
      /u/?wallet=DZhWeDMK...vu7h        (or ?player=name)
  and fetches JSON from your API. Set API_BASE below to your endpoint. Until then it renders sample data
  so you can see the layout. The contract the page expects from GET {API_BASE}/profile?wallet=... :

  {
    "name": "Captain Gatsu",
    "wallet": "DZhWeDMKTqfkMWK6H4Uzsc6jmUA8oD4WXqu4Ne31vu7h",
    "island": "Saltmarsh Cay",
    "joined": "2026-01-15",                         // ISO date
    "combatLevel": 84,
    "boundShells": 18420,                           // soft currency (display only)
    "skills": [ { "name": "Fishing", "level": 92, "xp": 6517253, "xpNext": 6800000 }, ... ],
    "achievements": [ { "name": "First Catch", "desc": "...", "earned": true, "date": "2026-01-16" }, ... ],
    "topItems": [ { "name": "Silvergill", "qty": 4213, "quality": 4 }, ... ]   // quality 0-4 Common..Unique
  }
  Levels cap at 99 per skill; total level is summed from skills. Quality 0-4 maps to the in-game tiers.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --abyss:#0a181d;          /* deep ocean, page */
    --hull:#102a31;           /* panel */
    --hull-2:#0d2228;         /* panel inset */
    --line:#1d4048;           /* hairline */
    --brass:#d4af6a;          /* metallic gold — currency, key numbers */
    --brass-dim:#9c8049;
    --seafoam:#7fccb8;        /* sea-glass accent */
    --shell:#e9e0cd;          /* primary text (parchment) */
    --shell-dim:#a9b4ad;      /* secondary text */
    --shell-faint:#6f8079;    /* tertiary */
    /* quality tiers, matched to the game */
    --q0:#b9c2bd; --q1:#7fc77f; --q2:#6fa8e0; --q3:#b98fe0; --q4:#e6c15a;
    --r:14px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--abyss); color:var(--shell);
    font-family:Inter,system-ui,sans-serif; line-height:1.5;
    /* faint faceted depth, like light through water */
    background-image:
      radial-gradient(1200px 600px at 80% -10%, rgba(127,204,184,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(212,175,106,.05), transparent 55%);
    background-attachment:fixed;
  }
  a{color:inherit}
  .wrap{max-width:1040px; margin:0 auto; padding:32px 22px 80px}

  /* ---- low-poly tide divider (signature motif) ---- */
  .tideline{display:block; width:100%; height:34px; color:var(--line)}
  .tideline path{fill:currentColor}

  /* ---- hero / crest ---- */
  .crest{
    position:relative; border:1px solid var(--line); border-radius:var(--r);
    background:linear-gradient(180deg, var(--hull), var(--hull-2));
    padding:30px 30px 26px; overflow:hidden;
  }
  .crest::before{ /* faceted corner glint */
    content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px;
    background:conic-gradient(from 200deg, rgba(212,175,106,.18), transparent 35%);
    transform:rotate(8deg); pointer-events:none;
  }
  .eyebrow{
    font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--seafoam); margin:0 0 10px;
  }
  .pname{
    font-family:Fraunces,serif; font-weight:600; font-size:clamp(34px,6vw,58px);
    line-height:1.02; margin:0; letter-spacing:-.01em;
  }
  .meta{display:flex; flex-wrap:wrap; gap:8px 18px; margin-top:14px; align-items:center}
  .wallet{
    font-family:"JetBrains Mono",monospace; font-size:12.5px; color:var(--shell-dim);
    background:rgba(0,0,0,.25); border:1px solid var(--line); border-radius:8px;
    padding:5px 9px; cursor:pointer; transition:border-color .15s, color .15s;
  }
  .wallet:hover,.wallet:focus-visible{border-color:var(--brass-dim); color:var(--shell); outline:none}
  .chip{font-size:13px; color:var(--shell-dim)}
  .chip b{color:var(--shell); font-weight:600}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:24px}
  .stat{border:1px solid var(--line); border-radius:12px; background:rgba(0,0,0,.18); padding:14px 16px}
  .stat .k{font-family:"JetBrains Mono",monospace; font-size:10.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--shell-faint)}
  .stat .v{font-family:Fraunces,serif; font-weight:600; font-size:30px; margin-top:4px; line-height:1}
  .stat .v.brass{color:var(--brass)}

  /* ---- sections ---- */
  section{margin-top:40px}
  .head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 2px 16px}
  .head h2{font-family:Fraunces,serif; font-weight:600; font-size:24px; margin:0; letter-spacing:-.01em}
  .head .note{font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--shell-faint); letter-spacing:.06em}

  /* ---- skills: rising-tide bars ---- */
  .skills{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  .skill{border:1px solid var(--line); border-radius:12px; background:var(--hull); padding:13px 15px}
  .skill .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px}
  .skill .nm{font-weight:600; font-size:14.5px}
  .skill .lv{font-family:"JetBrains Mono",monospace; font-size:13px; color:var(--brass)}
  .skill .lv small{color:var(--shell-faint)}
  .bar{position:relative; height:9px; border-radius:6px; background:rgba(0,0,0,.35); overflow:hidden}
  .bar > i{
    position:absolute; inset:0 auto 0 0; display:block; border-radius:6px;
    background:linear-gradient(90deg, var(--seafoam), #a9e0d1);
    box-shadow:0 0 10px rgba(127,204,184,.35);
    width:0; transition:width 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .skill.max .bar > i{background:linear-gradient(90deg, var(--brass-dim), var(--brass))}
  .skill .xp{font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--shell-faint); margin-top:7px}

  /* ---- achievements ---- */
  .ach{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px}
  .badge{border:1px solid var(--line); border-radius:12px; background:var(--hull); padding:13px 15px; display:flex; gap:12px; align-items:flex-start}
  .badge .seal{flex:0 0 auto; width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
    background:rgba(212,175,106,.12); border:1px solid var(--brass-dim)}
  .badge .seal svg{width:18px; height:18px; color:var(--brass)}
  .badge .bn{font-weight:600; font-size:14px}
  .badge .bd{font-size:12.5px; color:var(--shell-dim); margin-top:2px}
  .badge .when{font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--shell-faint); margin-top:6px}
  .badge.locked{opacity:.5; filter:saturate(.5)}
  .badge.locked .seal{background:rgba(0,0,0,.25); border-color:var(--line)}
  .badge.locked .seal svg{color:var(--shell-faint)}

  /* ---- top items gathered ---- */
  .items{border:1px solid var(--line); border-radius:12px; background:var(--hull); overflow:hidden}
  .row{display:grid; grid-template-columns:30px 1fr auto; gap:14px; align-items:center; padding:12px 16px}
  .row + .row{border-top:1px solid var(--line)}
  .row .rank{font-family:Fraunces,serif; font-size:18px; color:var(--shell-faint); text-align:center}
  .row .it{display:flex; align-items:center; gap:10px; min-width:0}
  .row .dot{width:9px; height:9px; border-radius:3px; flex:0 0 auto; transform:rotate(45deg)}
  .row .it .nm{font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .qty{font-family:"JetBrains Mono",monospace; font-size:14px; color:var(--shell-dim)}
  .qlabel{font-size:11px; color:var(--shell-faint); margin-left:2px}

  footer{margin-top:54px; text-align:center; color:var(--shell-faint); font-size:12.5px}
  .preview-flag{
    display:inline-block; margin-bottom:18px; font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:.08em; color:var(--brass); background:rgba(212,175,106,.10);
    border:1px solid var(--brass-dim); border-radius:999px; padding:5px 12px;
  }
  .hidden{display:none}

  @media (max-width:680px){
    .stats{grid-template-columns:1fr 1fr}
    .skills{grid-template-columns:1fr}
    .stat .v{font-size:26px}
  }
  @media (prefers-reduced-motion:reduce){ .bar > i{transition:none} }
</style>
</head>
<body>
  <main class="wrap">
    <div id="flag" class="preview-flag hidden">Preview data — connect the profile API to go live</div>

    <header class="crest">
      <p class="eyebrow">Captain's Dossier</p>
      <h1 class="pname" id="pname">—</h1>
      <div class="meta">
        <button class="wallet" id="wallet" title="Copy wallet">—</button>
        <span class="chip">Home island · <b id="island">—</b></span>
        <span class="chip">Sailing since <b id="joined">—</b></span>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">Total level</div><div class="v" id="totalLevel">—</div></div>
        <div class="stat"><div class="k">Combat level</div><div class="v" id="combatLevel">—</div></div>
        <div class="stat"><div class="k">Bound shells</div><div class="v brass" id="bound">—</div></div>
      </div>
    </header>

    <svg class="tideline" viewBox="0 0 1040 34" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 20 L130 8 L260 22 L390 10 L520 24 L650 9 L780 21 L910 11 L1040 22 L1040 34 L0 34 Z"/>
    </svg>

    <section>
      <div class="head"><h2>Skills</h2><span class="note" id="skillNote">—</span></div>
      <div class="skills" id="skills"></div>
    </section>

    <section>
      <div class="head"><h2>Achievements</h2><span class="note" id="achNote">—</span></div>
      <div class="ach" id="ach"></div>
    </section>

    <section>
      <div class="head"><h2>Top hauls</h2><span class="note">Most gathered, all time</span></div>
      <div class="items" id="items"></div>
    </section>

    <footer>Tidehold — a presence-driven island world.</footer>
  </main>

<script>
(function(){
  "use strict";

  // ── set this to your live endpoint to go live; leave "" to render sample data ──
  const API_BASE = "";   // e.g. "https://game.tidehold.world/api"

  const QNAME = ["Common","Uncommon","Fine","Rare","Unique"];
  const QVAR  = ["--q0","--q1","--q2","--q3","--q4"];
  const params = new URLSearchParams(location.search);
  const wallet = params.get("wallet") || params.get("player") || "";

  const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const fmt = n => Number(n||0).toLocaleString("en-US");
  const shortWallet = w => (w && w.length > 12) ? w.slice(0,4) + "…" + w.slice(-4) : (w || "Unlinked");
  const dateStr = d => { try { return new Date(d).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}); } catch(e){ return d; } };

  function sample(){
    const sk = [
      ["Fishing",92,6517253,6800000],["Sailing",80,2100000,2300000],["Cooking",88,4400000,4700000],
      ["Foraging",74,1180000,1330000],["Mining",69,800000,920000],["Woodcutting",71,930000,1040000],
      ["Crafting",63,520000,610000],["Attack",78,1980000,2150000],["Strength",81,2400000,2620000],
      ["Defence",76,1700000,1860000],["Taming",58,330000,400000],["Hitpoints",84,3050000,3300000]
    ].map(([name,level,xp,xpNext])=>({name,level,xp,xpNext}));
    return {
      name:"Captain Gatsu", wallet:"DZhWeDMKTqfkMWK6H4Uzsc6jmUA8oD4WXqu4Ne31vu7h",
      island:"Saltmarsh Cay", joined:"2026-01-15", combatLevel:84, boundShells:18420, skills:sk,
      achievements:[
        {name:"First Catch", desc:"Land your first fish", earned:true, date:"2026-01-16"},
        {name:"Deep Hauler", desc:"Catch a Unique-quality fish", earned:true, date:"2026-03-02"},
        {name:"Salted Away", desc:"Spend 100,000 Bound shells", earned:true, date:"2026-04-11"},
        {name:"Island Hopper", desc:"Fast-travel to every island", earned:true, date:"2026-02-20"},
        {name:"Crowd Favourite", desc:"Win a duel with the crowd betting on you", earned:true, date:"2026-05-08"},
        {name:"Master Angler", desc:"Reach level 99 Fishing", earned:false},
        {name:"Full Hold", desc:"Reach level 99 in every gathering skill", earned:false},
        {name:"Tide Lord", desc:"Reach a total level of 2,000", earned:false}
      ],
      topItems:[
        {name:"Silvergill", qty:4213, quality:1},{name:"Driftwood Log", qty:3870, quality:0},
        {name:"Coral Shard", qty:2640, quality:2},{name:"Moonkelp", qty:1985, quality:1},
        {name:"Abyss Pearl", qty:312, quality:4},{name:"Tidecap Mushroom", qty:1450, quality:3}
      ]
    };
  }

  function render(p){
    document.title = `${p.name} — Tidehold`;
    document.getElementById("pname").textContent = p.name || "Unnamed Captain";
    const w = document.getElementById("wallet");
    w.textContent = shortWallet(p.wallet);
    if (p.wallet) w.addEventListener("click", ()=>{ navigator.clipboard && navigator.clipboard.writeText(p.wallet); w.textContent="Copied"; setTimeout(()=>w.textContent=shortWallet(p.wallet),1100); });
    document.getElementById("island").textContent = p.island || "Unsettled";
    document.getElementById("joined").textContent = p.joined ? dateStr(p.joined) : "—";

    const skills = Array.isArray(p.skills) ? p.skills : [];
    const total = skills.reduce((s,k)=>s+(k.level||0),0);
    document.getElementById("totalLevel").textContent = fmt(total);
    document.getElementById("combatLevel").textContent = p.combatLevel!=null ? p.combatLevel : "—";
    document.getElementById("bound").textContent = p.boundShells!=null ? fmt(p.boundShells) : "—";
    document.getElementById("skillNote").textContent = `${skills.length} tracked · total ${fmt(total)}`;

    const grid = document.getElementById("skills");
    grid.innerHTML = skills.map(k=>{
      const max = (k.level||0) >= 99;
      const pct = max ? 100 : Math.max(0, Math.min(100, Math.round(100*(k.xp||0)/(k.xpNext|| (k.xp||1)))));
      return `<div class="skill${max?" max":""}">
        <div class="top"><span class="nm">${esc(k.name)}</span><span class="lv">${k.level||0}<small>/99</small></span></div>
        <div class="bar"><i data-w="${pct}"></i></div>
        <div class="xp">${max ? "Mastered" : fmt(k.xp)+" / "+fmt(k.xpNext)+" XP"}</div>
      </div>`;
    }).join("") || `<p class="chip">No skills trained yet.</p>`;
    requestAnimationFrame(()=>grid.querySelectorAll(".bar > i").forEach(i=>i.style.width=i.dataset.w+"%"));

    const ach = Array.isArray(p.achievements)?p.achievements:[];
    const earned = ach.filter(a=>a.earned).length;
    document.getElementById("achNote").textContent = `${earned} of ${ach.length} earned`;
    const seal = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.6-4.8 2.6.9-5.4L3.2 7.7l5.4-.8z"/></svg>`;
    document.getElementById("ach").innerHTML = ach.map(a=>`
      <div class="badge${a.earned?"":" locked"}">
        <div class="seal">${seal}</div>
        <div><div class="bn">${esc(a.name)}</div><div class="bd">${esc(a.desc||"")}</div>
        ${a.earned && a.date ? `<div class="when">Earned ${dateStr(a.date)}</div>` : (a.earned?"":`<div class="when">Locked</div>`)}</div>
      </div>`).join("") || `<p class="chip">No achievements yet.</p>`;

    const items = Array.isArray(p.topItems)?p.topItems.slice():[];
    items.sort((a,b)=>(b.qty||0)-(a.qty||0));
    document.getElementById("items").innerHTML = items.map((it,i)=>{
      const q = Math.max(0,Math.min(4,it.quality||0));
      return `<div class="row">
        <div class="rank">${i+1}</div>
        <div class="it"><span class="dot" style="background:var(${QVAR[q]})"></span>
          <span class="nm">${esc(it.name)}</span>${q>0?`<span class="qlabel">${QNAME[q]}</span>`:""}</div>
        <div class="qty">${fmt(it.qty)}</div>
      </div>`;
    }).join("") || `<div class="row"><div class="rank">—</div><div class="it"><span class="nm">Nothing gathered yet.</span></div><div class="qty"></div></div>`;
  }

  async function load(){
    if (API_BASE && wallet){
      try{
        const res = await fetch(`${API_BASE}/profile?wallet=${encodeURIComponent(wallet)}`, {headers:{accept:"application/json"}});
        if (res.ok){ render(await res.json()); return; }
      }catch(e){ /* fall through to sample */ }
    }
    document.getElementById("flag").classList.remove("hidden");
    render(sample());
  }
  load();
})();
</script>
</body>
</html>
